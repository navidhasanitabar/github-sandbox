name: Download from Commit & Save to Repo

on:
  push:
    branches:
      - "**"

jobs:
  worker:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 jq coreutils zip

      - name: Setup directories
        run: |
          mkdir -p queue/pending queue/processing queue/done queue/failed downloads

      - name: Pick job
        id: job
        run: |
          set -e

          JOB=$(ls queue/pending/*.json 2>/dev/null | head -n 1 || true)

          if [ -z "$JOB" ]; then
            echo "no_job=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "no_job=false" >> $GITHUB_OUTPUT
          echo "job=$JOB" >> $GITHUB_OUTPUT

      - name: Move job to processing
        if: steps.job.outputs.no_job == 'false'
        run: |
          mv "${{ steps.job.outputs.job }}" queue/processing/

      - name: Load job
        if: steps.job.outputs.no_job == 'false'
        id: load
        run: |
          JOB_FILE="queue/processing/$(basename "${{ steps.job.outputs.job }}")"

          URL=$(jq -r '.url' "$JOB_FILE")
          ID=$(jq -r '.id' "$JOB_FILE")
          RETRIES=$(jq -r '.retries' "$JOB_FILE")
          MAX=$(jq -r '.max_retries' "$JOB_FILE")

          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "id=$ID" >> $GITHUB_OUTPUT
          echo "retries=$RETRIES" >> $GITHUB_OUTPUT
          echo "max=$MAX" >> $GITHUB_OUTPUT
          echo "file=$JOB_FILE" >> $GITHUB_OUTPUT

      - name: Download file (chunked safe)
        if: steps.job.outputs.no_job == 'false'
        run: |
          set -e

          mkdir -p downloads/tmp downloads/chunks

          URL="${{ steps.load.outputs.url }}"

          FILENAME=$(basename "$URL" | cut -d'?' -f1)
          if [ -z "$FILENAME" ]; then
            FILENAME="file_$(date +%s)"
          fi

          BASE="${FILENAME%.*}"
          EXT="${FILENAME##*.}"

          HASH=$(echo -n "$URL" | sha1sum | cut -c1-8)
          TS=$(date +%s)

          SAFE_PREFIX="${BASE}_${HASH}_${TS}"

          TMP_FILE="downloads/tmp/${SAFE_PREFIX}.${EXT}"

          echo "Downloading: $URL"

          aria2c \
            --split=4 \
            --max-connection-per-server=4 \
            --dir=downloads/tmp \
            --out="${SAFE_PREFIX}.${EXT}" \
            "$URL"

          # ----------------------------
          # SPLIT INTO 90MB CHUNKS
          # ----------------------------
          CHUNK_DIR="downloads/chunks/${SAFE_PREFIX}"
          mkdir -p "$CHUNK_DIR"

          echo "Splitting into 90MB chunks..."

          split -b 90M -d -a 4 \
            "$TMP_FILE" \
            "${CHUNK_DIR}/part_"

          rm -f "$TMP_FILE"

          echo "Done:"
          ls -lh "$CHUNK_DIR"

      - name: Move job to done
        if: success() && steps.job.outputs.no_job == 'false'
        run: |
          mv queue/processing/*.json queue/done/

      - name: Commit results (chunked downloads)
        run: |
          set -e

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # ONLY commit safe data (NO raw large files)
          git add queue/ downloads/chunks/ || true

          git commit -m "worker: processed job + chunked download" || true

          git pull --rebase origin main
          git push origin HEAD:main