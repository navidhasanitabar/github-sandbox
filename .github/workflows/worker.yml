name: Download Queue Worker

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  worker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 jq coreutils zip

      # -----------------------------
      # 1. Pick a job from queue
      # -----------------------------
      - name: Fetch job
        id: fetch
        run: |
          set -e

          JOB=$(ls queue/pending/*.json 2>/dev/null | head -n 1 || true)

          if [ -z "$JOB" ]; then
            echo "NO_JOB=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "NO_JOB=false" >> $GITHUB_OUTPUT
          echo "JOB_FILE=$JOB" >> $GITHUB_OUTPUT

      # -----------------------------
      # 2. Move to processing
      # -----------------------------
      - name: Lock job
        if: steps.fetch.outputs.NO_JOB == 'false'
        run: |
          mv "${{ steps.fetch.outputs.JOB_FILE }}" queue/processing/

      # -----------------------------
      # 3. Load job data
      # -----------------------------
      - name: Parse job
        if: steps.fetch.outputs.NO_JOB == 'false'
        id: job
        run: |
          set -e

          JOB_FILE="queue/processing/$(basename ${{ steps.fetch.outputs.JOB_FILE }})"

          URL=$(jq -r '.url' "$JOB_FILE")
          ID=$(jq -r '.id' "$JOB_FILE")
          RETRIES=$(jq -r '.retries' "$JOB_FILE")
          MAX=$(jq -r '.max_retries' "$JOB_FILE")

          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "id=$ID" >> $GITHUB_OUTPUT
          echo "file=$JOB_FILE" >> $GITHUB_OUTPUT

      # -----------------------------
      # 4. Download
      # -----------------------------
      - name: Download file
        if: steps.fetch.outputs.NO_JOB == 'false'
        run: |
          set -e

          mkdir -p downloads

          aria2c \
            --continue=true \
            --max-connection-per-server=4 \
            --split=4 \
            --timeout=30 \
            --retry-wait=5 \
            --max-tries=3 \
            --dir=downloads \
            "${{ steps.job.outputs.url }}"

      # -----------------------------
      # 5. Upload as GitHub Artifact
      # -----------------------------
      - name: Upload artifact
        if: steps.fetch.outputs.NO_JOB == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: download-${{ steps.job.outputs.id }}
          path: downloads/

      # -----------------------------
      # 6. Mark job as done
      # -----------------------------
      - name: Finish job
        if: steps.fetch.outputs.NO_JOB == 'false'
        run: |
          mv queue/processing/* queue/done/

      # -----------------------------
      # 7. Commit queue state only
      # -----------------------------
      - name: Commit queue state
        if: steps.fetch.outputs.NO_JOB == 'false'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add queue/

          git commit -m "queue update [skip ci]" || true
          git push