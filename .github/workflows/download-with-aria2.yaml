name: URL Downloader Pipeline

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "Space or newline separated URLs"
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest

    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 curl jq coreutils

      - name: Run downloader
        env:
          URLS: ${{ github.event.inputs.urls }}
        run: |
          chmod +x scripts/downloader.sh
          ./scripts/downloader.sh "$URLS"

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add downloads/

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "Add downloaded files [ci skip]"
          git push